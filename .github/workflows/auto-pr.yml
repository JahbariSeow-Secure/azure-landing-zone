name: Auto PR

on:
  push:
    branches:
      - test-branch

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: test-branch

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Create pull request
        run: gh pr create -B main -H test-branch --title "Merge test-branch into main" --body "Created by GitHub action"
